api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: backend-net

certificatesResolvers:
  myresolver:
    acme:
      email: admin@firstasia.edu.ph
      storage: /letsencrypt/acme.json
      tlsChallenge: {}